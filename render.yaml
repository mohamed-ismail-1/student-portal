# Render Blueprint for Student Portal
services:
  # Backend Service
  - type: web
    name: student-backend
    env: docker
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: student-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: student-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: student-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: student-db
          property: user
      - key: DB_PASS
        fromDatabase:
          name: student-db
          property: password

  # Frontend Service
  - type: web
    name: student-frontend
    env: docker
    dockerContext: .
    dockerfilePath: frontend/Dockerfile
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          name: student-backend
          type: web
          property: host

databases:
  - name: student-db
    plan: free
